services:
    server:
        build: ./server
        ports:
            - "${SERVER_PORT:-5000}:5000"
        environment:
            - MONGODB_URI=${MONGODB_URI_DOCKER}
            - JWT_SECRET=${JWT_SECRET}
            - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
            - OPENROUTER_MODEL=${OPENROUTER_MODEL}
            - ENCRYPTION_SECRET_KEY=${ENCRYPTION_SECRET_KEY}
        depends_on:
            - mongo

    client:
        build: ./client
        ports:
            - "3000:3000"
        depends_on:
            - server

    mongo:
        image: mongo:latest
        ports:
            - "27017:27017"
        volumes:
            - mongodb:/data/db

volumes:
    mongodb:
